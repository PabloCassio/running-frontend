# Docker Compose para DESENVOLVIMENTO do frontend do Maratona Ao Vivo
# Foco exclusivo em ambiente de desenvolvimento com hot-reload

version: '3.8'

services:
  # Frontend em modo teste (CI)
  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maratona-frontend-test
    environment:
      NODE_ENV: test
      CI: "true"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run test:ci

  # Frontend em modo desenvolvimento
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maratona-frontend-only-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:5000
      VITE_WS_URL: ws://localhost:5000
      VITE_CLIENT_URL: http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    networks:
      - maratona-frontend-network
    command: npm run dev

networks:
  maratona-frontend-network:
    driver: bridge
    name: maratona-frontend-network